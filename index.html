<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Ayush ❤️</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #ffe6e6, #ffb3ba, #ffdfd3); font-family: 'Arial', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; position: relative; }
        .heart { position: absolute; color: #ff4d6d; font-size: 20px; animation: floatUp 6s linear infinite; opacity: 0.7; bottom: -10%; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(-110vh) scale(1.3) rotate(360deg); opacity: 0; } }
        .container { width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2); text-align: center; border: 2px solid rgba(255, 179, 186, 0.5); z-index: 10; }
        h1 { color: #ff4d6d; font-size: 2.2rem; margin-bottom: 15px; }
        .image-frame { width: 160px; height: 160px; margin: 0 auto 20px; border-radius: 50%; border: 4px solid #ff4d6d; overflow: hidden; }
        .image-frame img { width: 100%; height: 100%; object-fit: cover; }
        p.message { font-size: 1.1rem; color: #4a4a4a; line-height: 1.6; margin-bottom: 25px; font-style: italic; }
        .btn-surprise { background: linear-gradient(45deg, #ff4d6d, #ff758f); color: white; border: none; padding: 12px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; }
        .hidden-surprise { display: none; margin-top: 20px; padding: 15px; background: #fff0f3; border-radius: 15px; border-left: 5px solid #ff4d6d; }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-frame"><img src="https://i.ibb.co/RxJwDC6/Image-152.jpg" alt="Birthday"></div>
        <h1>Happy Birthday Ayush ❤️</h1>
        <p class="message">"Duniya ki har khushi tumhare kadam chume, aur tumhara muskurata chehra hamesha meri duniya ko roshan rakhe!"</p>
        <button class="btn-surprise" onclick="document.getElementById('surprise-text').style.display='block'">Tap for Surprise ✨</button>
        <div class="hidden-surprise" id="surprise-text">
            <h3 style="color: #ff2a55;">I Promise To You... 🌹</h3>
            <p>Har mod par saath nibhane ka, aur tumhari har khushi mein muskurane ka. God bless you!</p>
        </div>
    </div>
    <script>
        function createHeart() { const heart = document.createElement('div'); heart.classList.add('heart'); heart.innerHTML = '❤️'; heart.style.left = Math.random() * 100 + 'vw'; heart.style.animationDuration = Math.random() * 3 + 3 + 's'; document.body.appendChild(heart); setTimeout(() => heart.remove(), 6000); }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
